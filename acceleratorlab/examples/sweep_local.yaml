# AcceleratorLab sweep scenario
# Runs a grid of benchmarks varying concurrency, prompt length, and output length.
# Each combination is a separate benchmark run against the same endpoint.
#
# Run with:
#   python -m scalelab.cli.run --sweep examples/sweep_local.yaml

sweep:
  name: local-sweep

  base_scenario:
    cluster:
      accelerator_vendor: nvidia
      accelerator_arch: h100
      nodes: 1
      accelerators_per_node: 8
      interconnect: ethernet
      ssh_user: ""
      hosts: []
      slurm_partition: gpu
      slurm_account: ""
    workload:
      name: sweep-run
      model: meta-llama/Llama-3.1-8B-Instruct
      backend: openai-compat
      traffic_pattern: steady
      # prompt_tokens, output_tokens, and concurrency are overridden by ranges below
      prompt_tokens: 512
      output_tokens: 128
      concurrency: 1
      requests: 50
      duration_s: 60
      target_ttft_ms: 1500
      target_p95_ms: 4000
      endpoint: http://127.0.0.1:8000/v1
      api_key: EMPTY
    launch:
      executor: local
      model_cache_dir: ""
      tensor_parallel: 1
      pipeline_parallel: 1
      extra_args: []
      env: {}
      nodes_per_replica: 1
      replicas: 1

  ranges:
    concurrency:   [1, 4, 8, 16, 32]
    prompt_tokens: [512, 1024, 2048]
    output_tokens: [128, 256]
    # Optional — uncomment to sweep across multiple models or backends:
    # models:   [meta-llama/Llama-3.1-8B-Instruct, Qwen/Qwen2.5-7B-Instruct]
    # backends: [vllm, sglang]